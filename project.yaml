version: '3.0'

expectations:

  population_size: 1000

actions:

  ## # # # # # # # # # # # # # # # # # # # 
  ## DO NOT EDIT project.yaml DIRECTLY 
  ## This file is created by create-project.R 
  ## Edit and run create-project.R to update the project.yaml 
  ## # # # # # # # # # # # # # # # # # # # 
  ## # # # # # # # # # # # # # # # # # # # 
  ## Pre-server scripts 
  ## # # # # # # # # # # # # # # # # # # # 
  ## # # # # # # # # # # # # # # # # # # # 
  ## Extract and tidy 
  ## # # # # # # # # # # # # # # # # # # # 

  extract:
    run: ehrql:v1 generate-dataset analysis/1-extract/dataset_definition.py --output
      output/1-extract/extract.arrow --dummy-data-file analysis/1-extract/dummy_extract.arrow
      -- --studystart_date=2024-09-30 --studyend_date=2025-02-28
    needs: []
    outputs:
      highly_sensitive:
        arrow: output/1-extract/extract.arrow

  prepare:
    run: r:v2 analysis/2-select/prepare.R
    needs:
    - extract
    outputs:
      highly_sensitive:
        arrow: output/2-select/*.arrow

  ## # # # # # # # # # # # # # # # # # # # 
  ## Cohort: age65plus 
  ## # # # # # # # # # # # # # # # # # # # 

  select_age65plus:
    run: r:v2 analysis/2-select/select.R age65plus
    needs:
    - prepare
    outputs:
      highly_sensitive:
        arrow: output/2-select/age65plus/*.arrow
      moderately_sensitive:
        csv: output/2-select/age65plus/*.csv

  ## # # # # # # # # # # # # # # # # # # # 
  ## Matching 
  ## # # # # # # # # # # # # # # # # # # # 

  adjust_age65plus_match_A:
    run: r:v2 analysis/3-adjust/balance.R age65plus match A
    needs:
    - select_age65plus
    outputs:
      highly_sensitive:
        arrow: output/3-adjust/age65plus/match-A/*.arrow

  adjust_age65plus_match_A_report:
    run: r:v2 analysis/3-adjust/report.R age65plus match A
    needs:
    - select_age65plus
    - adjust_age65plus_match_A
    outputs:
      moderately_sensitive:
        csv: output/3-adjust/age65plus/match-A/report/*.csv
        png: output/3-adjust/age65plus/match-A/report/*.png

  ## # # # # # # # # # # # # # # # # # # # 
  ## Weighting 
  ## # # # # # # # # # # # # # # # # # # # 

  adjust_age65plus_weight_A:
    run: r:v2 analysis/3-adjust/balance.R age65plus weight A
    needs:
    - select_age65plus
    outputs:
      highly_sensitive:
        arrow: output/3-adjust/age65plus/weight-A/*.arrow

  adjust_age65plus_weight_A_report:
    run: r:v2 analysis/3-adjust/report.R age65plus weight A
    needs:
    - select_age65plus
    - adjust_age65plus_weight_A
    outputs:
      moderately_sensitive:
        csv: output/3-adjust/age65plus/weight-A/report/*.csv
        png: output/3-adjust/age65plus/weight-A/report/*.png

  ## # # # # # # # # # # # # # # # # # # # 
  ## combine weights from all adjustment strategies 
  ## # # # # # # # # # # # # # # # # # # # 

  adjust_combine_age65plus:
    run: r:v2 analysis/3-adjust/combine-weights.R age65plus
    needs:
    - select_age65plus
    - adjust_age65plus_match_A
    - adjust_age65plus_weight_A
    outputs:
      highly_sensitive:
        arrow: output/3-adjust/age65plus/combine/*.arrow

  ## # # # # # # # # # # # # # # # # # # # 
  ## Estimate cumulative incidence curves 
  ## # # # # # # # # # # # # # # # # # # # 
  ## ### Aalen-Johansen estimates 

  aj_age65plus_match_A_all_covid_admitted:
    run: r:v2 analysis/4-contrast/aj.R --df_input=output/3-adjust/age65plus/combine/data_weights.arrow
      --dir_output=output/4-contrast/age65plus/match-A/all/covid_admitted/aj/ --exposure=treatment
      --subgroups=all --origin_date=vax_date --event_date=covid_admitted_date --censoring_date=censor_date
      --competing_date=death_date --weight=wt_age65plus_match_A --max_fup=168 --min_count=6
      --method=constant --contrast=TRUE --plot=TRUE
    needs:
    - adjust_combine_age65plus
    outputs:
      highly_sensitive:
        arrow: output/4-contrast/age65plus/match-A/all/covid_admitted/aj/*.arrow
      moderately_sensitive:
        csv: output/4-contrast/age65plus/match-A/all/covid_admitted/aj/*.csv
        png: output/4-contrast/age65plus/match-A/all/covid_admitted/aj/*.png

  aj_age65plus_match_A_ageband_covid_admitted:
